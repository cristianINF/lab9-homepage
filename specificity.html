<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Specificity Game</title>
    <style>
h2 {
    font-family: Arial;
}
</style>
    <style>
        p {
            color: gray;
            font-size: 1rem;
            font-family: Georgia, serif;
            line-height: 1.4;
            padding: 4px 0;
        }

        .info {
            color: steelblue;
            font-size: 1.25rem;
            background-color: #e8f4fd;
            padding: 8px 14px;
            border-left: 5px solid steelblue;
            font-family: Arial, sans-serif;
        }

        #warning {
            color: darkred;
            font-size: 0.8rem;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border: 2px dashed darkred;
            padding: 10px;
            background-color: #fff0f0;
            font-family: 'Courier New', monospace;
        }

        #warning.info {
            color: darkorange;
            background-color: #fff7e0;
            border: 2px solid darkorange;
            font-size: 1.1rem;
            font-style: normal;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

    <p>Paragraph A</p>

    <p class="info">Paragraph B</p>

    <p id="warning">Paragraph C</p>

    <p class="info" id="warning">Paragraph D</p>

 <h1>title1</h1>
    <h2 style="text-align:center;">Personal Skills</h2>
    <table class="skills-table">
    <tr>
        <td class="category" rowspan="3">Programming</td>
        <td>Python</td>
        <td class="highlight-green">JavaScript</td>
    </tr>
    <tr>
        <td>C/C++</td>
        <td class="highlight-red">Java</td>
    </tr>
    <tr>
        <td>Java</td>
        <td>-</td>
    </tr>

    <tr>
        <td class="category" rowspan="4">Design</td>
        <td colspan="2">Figma</td>
    </tr>
    <tr><td colspan="2">Adobe XD</td></tr>
    <tr><td colspan="2">Photoshop</td></tr>
    <tr><td colspan="2">UI/UX</td></tr>

    <tr>
        <td class="category">Other</td>
        <td colspan="2">Git</td>
    </tr>
</table>

</body>
</html>
